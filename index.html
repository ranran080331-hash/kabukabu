<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>7桁ハンター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --card: #222;
  --border: #333;
  --red: #ff2d2d;
  --red-dim: rgba(255,45,45,0.12);
  --gold: #ffcc00;
  --gold-dim: rgba(255,204,0,0.1);
  --text: #f5f5f5;
  --muted: #777;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; padding-bottom:40px; }
.wrap { max-width:640px; margin:0 auto; padding:24px 16px; }

/* Header */
.header { display:flex; align-items:center; gap:12px; margin-bottom:24px; padding-bottom:20px; border-bottom:1px solid var(--border); }
.header-icon { width:48px; height:48px; background:var(--red); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.header-title { font-size:22px; font-weight:900; line-height:1.1; }
.header-sub { font-size:12px; color:var(--muted); margin-top:2px; }

/* Section */
.section { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.section-title { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:12px; }

/* Inputs */
.field { margin-bottom:12px; }
.field:last-child { margin-bottom:0; }
.field-label { font-size:12px; color:var(--muted); margin-bottom:6px; display:block; }
.field-row { display:flex; gap:8px; }

input, textarea {
  width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:10px;
  color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:15px;
  padding:12px 14px; outline:none; transition:border-color 0.2s;
  -webkit-appearance:none; appearance:none;
}
input[type="number"] { font-family:'JetBrains Mono',monospace; font-size:16px; text-align:center; }
input[type="password"] { font-family:'JetBrains Mono',monospace; font-size:14px; letter-spacing:2px; }
input:focus, textarea:focus { border-color:var(--red); box-shadow:0 0 0 3px var(--red-dim); }
input::placeholder, textarea::placeholder { color:#444; }
textarea { resize:none; line-height:1.7; font-size:15px; }

.icon-btn { min-width:48px; height:48px; background:var(--card); border:1.5px solid var(--border); border-radius:10px; color:var(--muted); font-size:18px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }

.num-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.num-field { text-align:center; }
.num-field .field-label { text-align:center; }

.run-btn { width:100%; height:56px; background:var(--red); border:none; border-radius:var(--radius); color:white; font-family:'Noto Sans JP',sans-serif; font-weight:900; font-size:17px; letter-spacing:1px; cursor:pointer; transition:opacity 0.15s,transform 0.1s; margin-top:4px; }
.run-btn:active { opacity:0.85; transform:scale(0.98); }
.run-btn:disabled { background:#2a2a2a; color:#444; }

/* Progress */
.progress-section { display:none; background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.progress-section.visible { display:block; }
.progress-track { background:var(--border); border-radius:99px; height:6px; margin-bottom:12px; overflow:hidden; }
.progress-fill { height:100%; background:var(--red); border-radius:99px; width:0%; transition:width 0.4s ease; }
.log-box { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); max-height:100px; overflow-y:auto; line-height:2; }
.log-ok { color:#4ade80; }
.log-hit { color:var(--gold); }
.log-err { color:#f87171; }

/* Results wrap */
.results-wrap { display:none; }
.results-wrap.visible { display:block; }

/* Stats */
.stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:12px; }
.stat-card { background:var(--surface); border-radius:12px; padding:14px; text-align:center; }
.stat-num { font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:700; color:var(--red); line-height:1; }
.stat-name { font-size:11px; color:var(--muted); margin-top:4px; }

/* Number list panel */
.numlist-panel { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
.numlist-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.numlist-title { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.copy-all-btn { font-size:12px; font-weight:700; padding:6px 14px; border-radius:99px; border:1.5px solid var(--border); background:var(--card); color:var(--muted); cursor:pointer; }
.numlist-grid { display:flex; flex-wrap:wrap; gap:8px; }
.numlist-pill { font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; background:var(--gold-dim); border:1.5px solid rgba(255,204,0,0.3); color:var(--gold); padding:6px 14px; border-radius:99px; cursor:pointer; text-decoration:none; display:inline-block; transition:background 0.15s,transform 0.1s; }
.numlist-pill:hover { background:rgba(255,204,0,0.2); }
.numlist-pill:active { transform:scale(0.95); }

/* Filter tabs */
.tabs { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; padding-bottom:2px; -webkit-overflow-scrolling:touch; }
.tab { padding:8px 16px; border-radius:99px; font-size:13px; font-weight:700; white-space:nowrap; cursor:pointer; border:1.5px solid var(--border); background:var(--surface); color:var(--muted); flex-shrink:0; transition:all 0.15s; }
.tab.active { background:var(--red-dim); border-color:var(--red); color:var(--red); }
.csv-tab { padding:8px 16px; border-radius:99px; font-size:13px; font-weight:700; white-space:nowrap; cursor:pointer; border:1.5px solid var(--border); background:var(--surface); color:var(--muted); flex-shrink:0; margin-left:auto; }

/* Result cards */
.result-card { background:var(--surface); border-radius:var(--radius); padding:14px; margin-bottom:8px; animation:up 0.25s ease both; }
@keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.card-top { display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; }
.badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:6px; white-space:nowrap; flex-shrink:0; }
.badge-desc { background:rgba(96,165,250,0.15); color:#93c5fd; border:1px solid rgba(96,165,250,0.25); }
.badge-comment { background:rgba(74,222,128,0.12); color:#86efac; border:1px solid rgba(74,222,128,0.2); }
.card-video-title { font-size:12px; color:var(--muted); line-height:1.4; }
.card-video-title a { color:#aaa; text-decoration:none; }
.card-text { font-size:14px; line-height:1.7; color:#ccc; margin-bottom:10px; word-break:break-all; }
.hl { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px; color:var(--gold); background:var(--gold-dim); padding:1px 5px; border-radius:5px; border:1px solid rgba(255,204,0,0.2); cursor:pointer; text-decoration:none; }
.hl:hover { background:rgba(255,204,0,0.2); }
.card-nums { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.num-pill { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; background:var(--surface); border:1px solid var(--border); color:var(--muted); padding:4px 12px; border-radius:99px; transition:transform 0.15s; }
.num-pill.is-new { background:var(--gold-dim); border-color:rgba(255,204,0,0.5); color:var(--gold); animation: pulse-gold 2s infinite; }
@keyframes pulse-gold { 0% { box-shadow:0 0 0 0 rgba(255,204,0,0.4); } 70% { box-shadow:0 0 0 6px rgba(255,204,0,0); } 100% { box-shadow:0 0 0 0 rgba(255,204,0,0); } }
.likes-chip { font-size:12px; color:var(--muted); margin-left:auto; }

/* Favorite styles */
.fav-btn { cursor:pointer; font-size:14px; margin-left:6px; opacity:0.5; transition:opacity 0.2s, transform 0.1s; display:inline-flex; align-items:center; justify-content:center; }
.fav-btn:hover { opacity:1; transform:scale(1.2); }
.fav-btn.active { opacity:1; color:#ffcc00; text-shadow:0 0 8px rgba(255,204,0,0.4); }
.numlist-pill .fav-btn { margin-left:8px; font-size:12px; }

.empty { text-align:center; padding:48px 20px; color:var(--muted); font-size:14px; line-height:2; }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-icon">🎯</div>
    <div>
      <div class="header-title">7桁ハンター</div>
      <div class="header-sub">YouTube概要欄・コメントから数字を収集</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">API設定</div>
    <div class="field">
      <label class="field-label">YouTube APIキー</label>
      <div class="field-row">
        <input type="password" id="apiKey" placeholder="AIza...">
        <button class="icon-btn" id="toggleKeyBtn">👁</button>
      </div>
    </div>
    <div style="margin-top:12px; font-size:12px; color:var(--muted); display:flex; align-items:center; justify-content:space-between;">
      <span>検索済みビデオ: <span id="historyCount">0</span>件</span>
      <button onclick="resetHistory()" style="background:none; border:1px solid var(--border); color:var(--muted); font-size:10px; padding:2px 8px; border-radius:4px; cursor:pointer;">履歴リセット</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">リンク先設定 (クリック時に開くサイト)</div>
    <div class="field">
      <label class="field-label">URL（改行で複数指定。優先順位順。{{NUM}} が数字に置き換わります）</label>
      <textarea id="targetUrls" rows="3">https://www.google.com/search?q={{NUM}}
https://www.dlsite.com/maniax/fsr/=/keyword/{{NUM}}</textarea>
    </div>
  </div>

  <div class="section">
    <div class="section-title">検索設定</div>
    <div class="field">
      <label class="field-label">検索キーワード（複数は改行して入力）</label>
      <textarea id="searchQuery" rows="5">7桁
七桁
伝説の7桁
魔法の7桁
殿堂入り 7桁</textarea>
      <div style="font-size:10px; color:var(--muted); margin-top:4px;">※キーワード1つにつき検索APIを100pt消費します（1日合計10,000ptまで）。</div>
    </div>
    <div class="num-row">
      <div class="num-field">
        <label class="field-label">桁数</label>
        <input type="number" id="digitCount" value="7" min="1" max="15">
      </div>
      <div class="num-field">
        <label class="field-label">最大動画数</label>
        <input type="number" id="maxVideos" value="10" min="1" max="50">
      </div>
      <div class="num-field">
        <label class="field-label">コメント数</label>
        <input type="number" id="maxComments" value="100" min="10" max="500">
      </div>
    </div>
    <button class="run-btn" id="runBtn">▶ 収集スタート</button>
  </div>

  <div class="progress-section" id="progressBox">
    <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>
    <div class="log-box" id="logArea"></div>
  </div>

  <div class="results-wrap" id="resultsWrap">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="numlist-panel" id="favPanel" style="display:none; border-color:rgba(255,204,0,0.3); background:linear-gradient(to bottom, rgba(255,204,0,0.05), var(--surface));">
      <div class="numlist-header">
        <span class="numlist-title" style="color:var(--gold);">⭐ お気に入り数字（<span id="favCount">0</span>件）</span>
      </div>
      <div class="numlist-grid" id="favGrid"></div>
    </div>

    <div class="numlist-panel" id="numlistPanel" style="display:none">
      <div class="numlist-header">
        <span class="numlist-title">🔢 今まで収集した数字一覧（<span id="totalSavedCount">0</span>件）</span>
        <button class="copy-all-btn" id="copyBtn">📋 全コピー</button>
      </div>
      <div class="numlist-grid" id="numlistGrid"></div>
    </div>

    <div class="tabs">
      <button class="tab active" id="filterAll">すべて</button>
      <button class="tab" id="filterDesc">📄 概要欄</button>
      <button class="tab" id="filterComment">💬 コメント</button>
      <button class="csv-tab">⬇ CSV</button>
    </div>
    <div id="resultsList"></div>
  </div>

</div>
<script>
const BASE = 'https://www.googleapis.com/youtube/v3';
let allResults = [];
let currentFilter = 'all';
let savedNumbers = new Set();
let newlyFoundNumbers = new Set();
let searchedVideoIds = new Set();
let savedFavorites = new Set();

function saveFavorites() {
  try {
    localStorage.setItem('yt_hunter_favs', JSON.stringify(Array.from(savedFavorites)));
    renderResults();
  } catch(e) { console.error('Favorites save error:', e); }
}

function toggleFavorite(num, event) {
  if (event) event.stopPropagation();
  if (savedFavorites.has(num)) {
    savedFavorites.delete(num);
  } else {
    savedFavorites.add(num);
  }
  saveFavorites();
}

function saveSearchedVideos() {
  try {
    localStorage.setItem('yt_hunter_vids', JSON.stringify(Array.from(searchedVideoIds)));
    document.getElementById('historyCount').textContent = searchedVideoIds.size;
  } catch(e) { console.error('History save error:', e); }
}

function resetHistory() {
  if (confirm('検索済みの動画履歴をすべて消去しますか？')) {
    searchedVideoIds.clear();
    saveSearchedVideos();
    alert('履歴をリセットしました。');
  }
}

function openSitesForNumber(num) {
  const urlText = document.getElementById('targetUrls').value.trim();
  if (!urlText) {
    window.open('https://www.google.com/search?q=' + encodeURIComponent(num), '_blank');
    return;
  }
  const urls = urlText.split('\n').map(function(u){ return u.trim(); }).filter(function(u){ return u; });
  urls.forEach(function(url) {
    const finalUrl = url.replace(/{{NUM}}/g, encodeURIComponent(num));
    window.open(finalUrl, '_blank');
  });
}

function toggleKey() {
  const inp = document.getElementById('apiKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function log(msg, cls) {
  const area = document.getElementById('logArea');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  area.appendChild(line);
  area.scrollTop = area.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}

function extractNumbers(text, digits) {
  const re = new RegExp('(?<!\\d)\\d{' + digits + '}(?!\\d)', 'g');
  return [...text.matchAll(re)].map(function(m){ return m[0]; });
}

function highlightNumbers(text, digits) {
  const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const re = new RegExp('(?<!\\d)(\\d{' + digits + '})(?!\\d)', 'g');
  return safe.replace(re, '<a class="hl" onclick="openSitesForNumber(\'$1\')">$1</a>');
}

async function apiFetch(endpoint, params) {
  const apiKey = document.getElementById('apiKey').value.trim();
  const qs = new URLSearchParams(Object.assign({ key: apiKey }, params)).toString();
  const res = await fetch(BASE + '/' + endpoint + '?' + qs);
  if (!res.ok) {
    const err = await res.json();
    let msg = (err.error && err.error.message) || res.statusText;
    if (msg.includes('quota')) {
      msg = 'API利用制限（クォータ）を超過しました。YouTube APIは「1回の検索につき100ポイント」を消費するため、キーワード数が多いと早く制限に達します。数時間〜1日経つとリセットされます。';
    }
    throw new Error(msg);
  }
  return res.json();
}

async function searchVideos(query, maxVideos) {
  const data = await apiFetch('search', {
    q: query, part: 'snippet', type: 'video',
    maxResults: Math.min(50, maxVideos), relevanceLanguage: 'ja'
  });
  return (data.items || []).filter(function(i){ return i.id.videoId; }).slice(0, maxVideos);
}

async function getDescription(videoId) {
  const data = await apiFetch('videos', { id: videoId, part: 'snippet' });
  return (data.items[0] && data.items[0].snippet && data.items[0].snippet.description) || '';
}

async function getComments(videoId, maxComments) {
  const comments = [];
  let pageToken = null;
  try {
    while (comments.length < maxComments) {
      const params = { videoId: videoId, part: 'snippet', maxResults: Math.min(100, maxComments - comments.length), order: 'relevance' };
      if (pageToken) params.pageToken = pageToken;
      const data = await apiFetch('commentThreads', params);
      for (const item of data.items) {
        const s = item.snippet.topLevelComment.snippet;
        comments.push({ text: s.textDisplay || '', likes: s.likeCount || 0 });
      }
      pageToken = data.nextPageToken;
      if (!pageToken) break;
    }
  } catch(e) {}
  return comments;
}

async function startHunt() {
  saveSettings();
  const apiKey = document.getElementById('apiKey').value.trim();
  const queries = document.getElementById('searchQuery').value.trim().split('\n').map(function(q){ return q.trim(); }).filter(function(q){ return q; });
  const digits = parseInt(document.getElementById('digitCount').value) || 7;
  const maxVideos = parseInt(document.getElementById('maxVideos').value) || 10;
  const maxComments = parseInt(document.getElementById('maxComments').value) || 100;

  if (!apiKey) { alert('APIキーを入力してください'); return; }
  if (!queries.length) { alert('検索キーワードを入力してください'); return; }

  allResults = [];
  newlyFoundNumbers.clear();
  document.getElementById('runBtn').disabled = true;
  document.getElementById('progressBox').classList.add('visible');
  
  // Keep the list panel visible if we have saved numbers, but clear current search stats and results
  if (savedNumbers.size > 0) {
    document.getElementById('resultsWrap').classList.add('visible');
    document.getElementById('statsGrid').innerHTML = ''; 
  } else {
    document.getElementById('resultsWrap').classList.remove('visible');
  }
  document.getElementById('resultsList').innerHTML = ''; 
  document.getElementById('logArea').innerHTML = '';
  setProgress(0);

  try {
    const seenIds = new Set();
    const allVideos = [];
    for (const query of queries) {
      log('🔍 「' + query + '」で検索中...');
      const vids = await searchVideos(query, maxVideos);
      for (const v of vids) {
        if (!seenIds.has(v.id.videoId)) {
          seenIds.add(v.id.videoId);
          allVideos.push(v);
        }
      }
      log('  → ' + vids.length + '件発見', 'log-ok');
    }
    log('✅ 合計 ' + allVideos.length + '件の動画', 'log-ok');

    let skippedCount = 0;
    const processingVideos = [];
    for (const v of allVideos) {
      if (searchedVideoIds.has(v.id.videoId)) {
        skippedCount++;
      } else {
        processingVideos.push(v);
      }
    }

    if (skippedCount > 0) {
      log('ℹ️ ' + skippedCount + '件の動画を履歴に基づいてスキップしました。', 'log-ok');
    }

    for (let i = 0; i < processingVideos.length; i++) {
      const video = processingVideos[i];
      const videoId = video.id.videoId;
      const title = video.snippet.title;
      const url = 'https://www.youtube.com/watch?v=' + videoId;
      setProgress(Math.round((i / processingVideos.length) * 100));
      log('[' + (i+1) + '/' + processingVideos.length + '] ' + title.slice(0,35) + '...');

      const desc = await getDescription(videoId);
      const descNums = extractNumbers(desc, digits);
      if (descNums.length > 0) {
        descNums.forEach(function(n) {
          if (!savedNumbers.has(n)) newlyFoundNumbers.add(n);
        });
        log('  📄 概要欄: ' + descNums.join(', '), 'log-hit');
        allResults.push({ source: 'desc', url: url, title: title, text: desc.slice(0,300), numbers: descNums, likes: null });
      }

      const comments = await getComments(videoId, maxComments);
      let hits = 0;
      for (const c of comments) {
        const nums = extractNumbers(c.text, digits);
        if (nums.length > 0) {
          nums.forEach(function(n) {
            if (!savedNumbers.has(n)) newlyFoundNumbers.add(n);
          });
          hits++;
          allResults.push({ source: 'comment', url: url, title: title, text: c.text.slice(0,300), numbers: nums, likes: c.likes });
        }
      }
      if (hits > 0) log('  💬 コメント ' + hits + '件ヒット', 'log-hit');

      // Add to searched history
      searchedVideoIds.add(videoId);

      await new Promise(function(r){ setTimeout(r, 200); });
    }

    // Save history after hunt
    saveSearchedVideos();

    setProgress(100);
    
    // Save newly found numbers to persistent storage
    if (newlyFoundNumbers.size > 0) {
        newlyFoundNumbers.forEach(function(n) { savedNumbers.add(n); });
        saveStoredNumbers();
    }
    
    log('🏆 完了！' + allResults.length + '件ヒット (新規: ' + newlyFoundNumbers.size + '件)', 'log-ok');
    renderResults();

  } catch(e) {
    log('❌ エラー: ' + e.message, 'log-err');
  } finally {
    document.getElementById('runBtn').disabled = false;
  }
}

function renderResults() {
  const wrap = document.getElementById('resultsWrap');
  const list = document.getElementById('resultsList');
  const digits = parseInt(document.getElementById('digitCount').value) || 7;
  wrap.classList.add('visible');

  const filtered = currentFilter === 'all' ? allResults : allResults.filter(function(r){ return r.source === currentFilter; });
  const sorted = filtered.slice().sort(function(a,b){
    if (a.source === 'desc' && b.source !== 'desc') return -1;
    if (b.source === 'desc' && a.source !== 'desc') return 1;
    return (b.likes || 0) - (a.likes || 0);
  });

  const totalDesc = allResults.filter(function(r){ return r.source === 'desc'; }).length;
  const totalComment = allResults.filter(function(r){ return r.source === 'comment'; }).length;
  const uniqNums = [...new Set(allResults.flatMap(function(r){ return r.numbers; }))].sort();

  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card"><div class="stat-num">' + allResults.length + '</div><div class="stat-name">総ヒット</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + uniqNums.length + '</div><div class="stat-name">ユニーク数字</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + totalDesc + '</div><div class="stat-name">概要欄</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + totalComment + '</div><div class="stat-name">コメント</div></div>';

  // 数字一覧（これまでに保存されたすべての数字）
  const numPanel = document.getElementById('numlistPanel');
  const numGrid = document.getElementById('numlistGrid');
  const countSpan = document.getElementById('totalSavedCount');
  
  if (savedNumbers.size > 0) {
    numPanel.style.display = 'block';
    countSpan.textContent = savedNumbers.size;
    const allSavedArr = Array.from(savedNumbers).sort();
    numGrid.innerHTML = allSavedArr.map(function(n){ 
      const isNewClass = newlyFoundNumbers.has(n) ? ' is-new' : '';
      const newLabel = newlyFoundNumbers.has(n) ? ' <span style="font-size:10px;color:#ffcc00;">[NEW]</span>' : '';
      const isFav = savedFavorites.has(n);
      return '<div class="numlist-pill' + isNewClass + '" onclick="openSitesForNumber(\'' + n + '\')">' + 
             '<span>' + n + newLabel + '</span>' +
             '<span class="fav-btn' + (isFav ? ' active' : '') + '" onclick="toggleFavorite(\'' + n + '\', event)">' + (isFav ? '★' : '☆') + '</span>' +
             '</div>'; 
    }).join('');
  } else {
    numPanel.style.display = 'none';
  }

  // お気に入り一覧
  const favPanel = document.getElementById('favPanel');
  const favGrid = document.getElementById('favGrid');
  const favCountSpan = document.getElementById('favCount');

  if (savedFavorites.size > 0) {
    favPanel.style.display = 'block';
    favCountSpan.textContent = savedFavorites.size;
    const allFavArr = Array.from(savedFavorites).sort();
    favGrid.innerHTML = allFavArr.map(function(n){ 
      return '<div class="numlist-pill" onclick="openSitesForNumber(\'' + n + '\')">' + 
             '<span>' + n + '</span>' +
             '<span class="fav-btn active" onclick="toggleFavorite(\'' + n + '\', event)">★</span>' +
             '</div>'; 
    }).join('');
  } else {
    favPanel.style.display = 'none';
  }

  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty">該当する' + digits + '桁の数字が<br>見つかりませんでした</div>';
    return;
  }

  list.innerHTML = sorted.map(function(r, i){
    return '<div class="result-card" style="animation-delay:' + (i*0.03) + 's">' +
      '<div class="card-top">' +
        '<span class="badge ' + (r.source === 'desc' ? 'badge-desc' : 'badge-comment') + '">' + (r.source === 'desc' ? '概要欄' : 'コメント') + '</span>' +
        '<div class="card-video-title"><a href="' + r.url + '" target="_blank">' + r.title + '</a></div>' +
      '</div>' +
      '<div class="card-text">' + highlightNumbers(r.text, digits) + '</div>' +
      '<div class="card-nums">' +
        r.numbers.map(function(n){ 
          const isNewClass = newlyFoundNumbers.has(n) ? ' is-new' : '';
          const newLabel = newlyFoundNumbers.has(n) ? ' <span style="font-size:10px;color:#ffcc00;">[NEW]</span>' : '';
          const isFav = savedFavorites.has(n);
          return '<div class="num-pill' + isNewClass + '" onclick="openSitesForNumber(\'' + n + '\')" style="display:inline-flex; align-items:center; cursor:pointer;">' + 
                 '<span>' + n + newLabel + '</span>' +
                 '<span class="fav-btn' + (isFav ? ' active' : '') + '" onclick="toggleFavorite(\'' + n + '\', event)">' + (isFav ? '★' : '☆') + '</span>' +
                 '</div>'; 
        }).join('') +
        (r.likes !== null ? '<span class="likes-chip">👍 ' + Number(r.likes).toLocaleString() + '</span>' : '') +
      '</div>' +
    '</div>';
  }).join('');
}

function filterResults(type) {
  currentFilter = type;
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('filter' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
  renderResults();
}

function copyAllNums() {
  const allSavedArr = Array.from(savedNumbers).sort();
  if (!allSavedArr.length) return;
  navigator.clipboard.writeText(allSavedArr.join('\n')).then(function(){
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ コピー済み';
    setTimeout(function(){ btn.textContent = '📋 全コピー'; }, 2000);
  });
}

function downloadCSV() {
  if (!allResults.length) return;
  const headers = ['ソース','動画URL','タイトル','テキスト','数字','いいね数'];
  const rows = allResults.map(function(r){
    return [
      r.source === 'desc' ? '概要欄' : 'コメント',
      r.url, r.title,
      r.text.replace(/"/g,'""'),
      r.numbers.join(', '),
      r.likes != null ? r.likes : ''
    ];
  });
  const csv = [headers].concat(rows).map(function(r){ return r.map(function(v){ return '"' + v + '"'; }).join(','); }).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'youtube_hunter_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function loadSettings() {
  try {
    const keys = ['apiKey', 'searchQuery', 'digitCount', 'maxVideos', 'maxComments', 'targetUrls'];
    keys.forEach(function(key) {
      const val = localStorage.getItem('yt_hunter_' + key);
      if (val !== null) {
        document.getElementById(key).value = val;
      }
    });

    // Load stored numbers
    const storedNums = localStorage.getItem('yt_hunter_numbers');
    if (storedNums) {
      const parsedNums = JSON.parse(storedNums);
      if (Array.isArray(parsedNums)) {
        savedNumbers = new Set(parsedNums);
        renderResults(); // This will show the numbers in the list immediately on load
      }
    }

    // Load searched video history
    const storedVids = localStorage.getItem('yt_hunter_vids');
    if (storedVids) {
      const parsedVids = JSON.parse(storedVids);
      if (Array.isArray(parsedVids)) {
        searchedVideoIds = new Set(parsedVids);
        document.getElementById('historyCount').textContent = searchedVideoIds.size;
      }
    }

    // Load favorites
    const storedFavs = localStorage.getItem('yt_hunter_favs');
    if (storedFavs) {
      const parsedFavs = JSON.parse(storedFavs);
      if (Array.isArray(parsedFavs)) {
        savedFavorites = new Set(parsedFavs);
        renderResults();
      }
    }
  } catch (e) { console.error('Settings load error:', e); }
}

function saveStoredNumbers() {
  try {
    localStorage.setItem('yt_hunter_numbers', JSON.stringify(Array.from(savedNumbers)));
  } catch(e) { console.error('Numbers save error:', e); }
}

function saveSettings() {
  try {
    const keys = ['apiKey', 'searchQuery', 'digitCount', 'maxVideos', 'maxComments', 'targetUrls'];
    keys.forEach(function(key) {
      localStorage.setItem('yt_hunter_' + key, document.getElementById(key).value);
    });
  } catch (e) { console.error('Settings save error:', e); }
}

// Attach all event listeners after DOM ready
document.addEventListener('DOMContentLoaded', function() {
  loadSettings();
  const keys = ['apiKey', 'searchQuery', 'digitCount', 'maxVideos', 'maxComments', 'targetUrls'];
  keys.forEach(function(key) {
    const el = document.getElementById(key);
    if (el) {
      el.addEventListener('input', saveSettings);
      el.addEventListener('change', saveSettings);
    }
  });
  window.addEventListener('beforeunload', saveSettings);

  document.getElementById('toggleKeyBtn').addEventListener('click', toggleKey);
  document.getElementById('runBtn').addEventListener('click', startHunt);
  document.getElementById('copyBtn').addEventListener('click', copyAllNums);
  document.querySelector('.csv-tab').addEventListener('click', downloadCSV);
  document.getElementById('filterAll').addEventListener('click', function(){ filterResults('all'); });
  document.getElementById('filterDesc').addEventListener('click', function(){ filterResults('desc'); });
  document.getElementById('filterComment').addEventListener('click', function(){ filterResults('comment'); });
});
</script>
</body>
</html>
